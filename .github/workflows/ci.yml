name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same ref when a new commit lands.
# Saves CI minutes on rapid pushes; the latest result is the only one that matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: build / lint / test
    runs-on: ubuntu-latest
    # The CI runner does not install a cockroach binary, so any
    # integration-tagged test reaching cockroachtest.Shared would
    # otherwise t.Fatalf. Setting CRDB_INTEGRATION_OPTIONAL converts
    # that fatal back into a skip — only here, never on dev machines.
    env:
      CRDB_INTEGRATION_OPTIONAL: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin to whatever go.mod declares so CI never drifts from local.
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Lint
        run: make lint

      - name: Test
        run: make test
