name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

# Cancel superseded snapshot runs on the same ref. Tag pushes cannot cancel
# an in-flight release mid-upload and leave behind a half-populated draft.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  snapshot:
    name: snapshot build
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs full history to compute the snapshot version.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run goreleaser (snapshot)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=publish

      - name: Enforce binary size cap
        run: scripts/check-binary-size.sh

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-snapshot
          path: dist/
          retention-days: 7
          # Promote the goreleaser/size-check defense to a hard error: an
          # empty dist/ at this point means an earlier step's failure was
          # masked.
          if-no-files-found: error

  release:
    name: tagged release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run goreleaser (release)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce binary size cap
        run: scripts/check-binary-size.sh
