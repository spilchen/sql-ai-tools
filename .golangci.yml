version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - goheader
  settings:
    goheader:
      values:
        regexp:
          YEAR: '20\d{2}'
      template: |-
        Copyright {{ YEAR }} The Cockroach Authors.

        Use of this software is governed by the CockroachDB Software License
        included in the /LICENSE file.
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party

formatters:
  enable:
    - gofmt
    - goimports
